# K8s Release Tracker Configuration
# Customize sources, keywords, and notification settings
# Tracks changes that could impact Qualys CRS sensor and kubeapi connectivity

schedule:
  # How far back to look for changes (in days)
  lookback_days: 7

sources:
  kubernetes:
    enabled: true
    github_repo: "kubernetes/kubernetes"
    # Track these release streams (empty = all)
    track_versions: []

  eks:
    enabled: true
    github_repo: "awsdocs/amazon-eks-user-guide"
    # AWS EKS announcements and what's new feed
    announcements_rss: "https://aws.amazon.com/about-aws/whats-new/recent/feed/"
    # EKS-specific repos tracked in fetchers.py

  aks:
    enabled: true
    github_repo: "Azure/AKS"
    release_notes_url: "https://raw.githubusercontent.com/Azure/AKS/master/CHANGELOG.md"

  gke:
    enabled: true
    release_notes_url: "https://cloud.google.com/feeds/kubernetes-engine-release-notes.xml"

  openshift:
    enabled: true
    github_repo: "openshift/origin"
    # OCP errata/release notes
    release_notes_url: "https://raw.githubusercontent.com/openshift/openshift-docs/main/release_notes/ocp-4-latest-release-notes.adoc"

# Keywords that indicate breaking changes
breaking_change_keywords:
  # General breaking changes
  - "breaking change"
  - "breaking"
  - "removed"
  - "deprecated"
  - "deprecation"
  - "no longer supported"
  - "backwards incompatible"
  - "backward incompatible"
  - "migration required"
  - "action required"
  - "ACTION REQUIRED"
  - "removed in"
  - "will be removed"
  - "no longer available"
  - "must migrate"
  - "API removal"
  - "api removal"
  - "removed API"
  - "upgrade notes"
  - "urgent upgrade notes"
  # Authentication / Token / KubeAPI changes
  - "token expiration"
  - "token lifetime"
  - "token rotation"
  - "service account token"
  - "bound service account"
  - "TokenRequest"
  - "TokenReview"
  - "authentication"
  - "401"
  - "403"
  - "Unauthorized"
  - "kube-apiserver"
  - "kubeapi"
  - "OIDC"
  - "webhook authentication"
  - "client certificate"
  - "certificate rotation"
  - "cert expir"
  - "TLS"
  # RBAC / Authorization changes
  - "RBAC"
  - "ClusterRole"
  - "ServiceAccount"
  - "pod security"
  - "PodSecurityPolicy"
  - "pod security admission"
  - "security context"
  # Runtime / Container changes (affects sensors)
  - "container runtime"
  - "containerd"
  - "CRI"
  - "cgroup"
  - "cgroupv2"
  - "seccomp"
  - "AppArmor"
  - "eBPF"
  - "DaemonSet"
  - "hostPID"
  - "hostNetwork"
  - "privileged"
  # Storage / Filesystem / Overlay changes (sensor mount paths)
  - "storage driver"
  - "overlay"
  - "overlayfs"
  - "GCFS"
  - "image streaming"
  - "mount"
  - "fuse"
  - "snapshot"
  - "snapshotter"
  - "not supported"
  - "not deployed"
  - "fails to deploy"
  - "incompatible"
  # Networking changes
  - "CoreDNS"
  - "kube-proxy"
  - "network policy"
  - "CNI"
  - "VPC CNI"

# Keywords specific to Qualys sensor impact
# These get flagged with a special "Sensor Impact" tag in the report
