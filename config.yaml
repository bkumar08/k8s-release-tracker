  - "token expiration"
  - "token lifetime"
  - "token rotation"
  - "service account token"
  - "bound service account"
  - "401"
  - "Unauthorized"
  - "kube-apiserver"
  - "certificate rotation"
  - "DaemonSet"
  - "hostPID"
  - "hostNetwork"
  - "privileged"
  - "container runtime"
  - "containerd"
  - "CRI"
  - "eBPF"
  - "seccomp"
  - "cgroup"
  - "pod security admission"
  - "storage driver"
  - "overlay"
  - "overlayfs"
  - "GCFS"
  - "image streaming"
  - "mount"
  - "fuse"
  - "snapshotter"
  - "not supported"
  - "not deployed"
  - "fails to deploy"

# Severity classification keywords
severity_keywords:
  critical:
    - "security"
    - "CVE-"
    - "vulnerability"
    - "critical"
    - "urgent"
    - "401"
    - "Unauthorized"
    - "token expiration"
    - "certificate expir"
  high:
    - "breaking change"
    - "removed"
    - "action required"
    - "API removal"
    - "kube-apiserver"
    - "authentication"
    - "RBAC"
    - "service account token"
    - "not supported"
    - "not deployed"
    - "fails to deploy"
    - "storage driver"
    - "overlay"
    - "GCFS"
  medium:
    - "deprecated"
    - "deprecation"
    - "will be removed"
    - "token rotation"
    - "container runtime"
    - "DaemonSet"
  low:
    - "upgrade notes"
    - "migration"
